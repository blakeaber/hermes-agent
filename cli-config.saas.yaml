# cli-config.saas.yaml — config baked into Hermes saas/cloud image.
#
# Differences vs cli-config.yaml.example:
#   - model.provider: bedrock (NOT openrouter or auto-detect) — for data
#     sovereignty, privacy, and cost control. Bedrock auth via task IAM role
#     (boto3 picks up AWS_CONTAINER_CREDENTIALS_RELATIVE_URI on Fargate).
#   - kanban.dispatch_in_gateway: false — cloud OOM-risk fix (per Plan 002 / 005-A:
#     per-worker MCP fan-out exceeds Fargate's 8GB ceiling).
#   - No base_url for model — Bedrock adapter resolves via AWS_REGION env.
#   - Minimal: just what the cloud gateway needs. Plan 009 owns this file.

model:
  # Plan 018-C (2026-05-29): the canonical source of truth is the `tier`
  # field below — `balanced` resolves to whichever Bedrock model id
  # `army-of-one/backend/src/atlas/llm/tiers.yaml` currently points at
  # (us.amazon.nova-pro-v1:0 as of 2026-05-29). Hermes's current config
  # loader still requires a literal string in `default:` for the cold-start
  # path, so we keep it in sync with the tier — the comment block below
  # documents the rationale for the chosen model. When the Hermes config
  # loader learns to resolve `tier:` against the shared tiers.yaml (a
  # follow-up phase), `default:` becomes unused and can be deleted.
  #
  # Model: Claude Haiku 4.5 on Bedrock (2026-06-03, Plan 037 nanny-state fix).
  #
  # Why moved OFF Nova Pro:
  #   - Nova Pro's built-in alignment persona produced "nanny-state"
  #     refusals: it declined ordinary personal-assistant requests (e.g.
  #     "recall my own memories" -> refused on "privacy/security" and
  #     moralized about "unsafe behavior"), never calling the ungated
  #     atlas_recall tool. The agent code + prompt are clean — the refusal
  #     was the model. Haiku follows the helpful-assistant prompt directly.
  #   - Haiku 4.5 on Bedrock Converse fully supports streaming + tool use
  #     (the Llama-3.3 streaming-tool gap that originally drove the Nova
  #     choice does NOT apply to Claude). IAM (agentic-stack-hermes-task)
  #     already grants us.anthropic.* ARNs, so no IAM change is needed.
  #   - ~$1 / $5 per M tokens (in / out) — cheaper/faster than Sonnet 4.6;
  #     fine for a personal assistant. Bedrock-native (no Portkey hop).
  #
  # Rollback: set `default:` back to `us.amazon.nova-pro-v1:0` (or
  # `us.anthropic.claude-sonnet-4-6`), rebuild, redeploy. IAM grants
  # amazon.* + us.amazon.* + us.anthropic.* — revert is safe.
  # NOTE: `tier:` is documentation-only today — Hermes's loader uses the
  # literal `default:` string (tiers.yaml resolution is unimplemented).
  tier: balanced
  default: us.anthropic.claude-haiku-4-5-20251001-v1:0
  provider: bedrock

# No providers / fallback_providers / credential_pool_strategies needed for
# the Bedrock direct path — boto3 handles credential resolution natively.
providers: {}
fallback_providers: []
credential_pool_strategies: {}

# Single platform: Slack. Other platforms (telegram, discord, whatsapp, signal)
# are intentionally not configured in cloud — they ship with local-only auth
# in the upstream OSS Hermes and would need their own secret wiring to enable
# in cloud. Plan 009 followup if multi-platform-in-cloud is ever needed.
toolsets:
- hermes-cli

agent:
  max_turns: 60
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  clarify_timeout: 600
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
  verbose: false
  reasoning_effort: medium

# Disable kanban dispatcher in cloud (OOM-risk per Plan 002 / 005-A notes —
# per-worker MCP fan-out spawns N×7 processes). Cloud Hermes is Slack-only.
# Re-enable via env var override OR mounted config when MCP-pool work lands
# (Plan 002-C / Plan 008).
kanban:
  dispatch_in_gateway: false
  max_spawn: 3
  max_in_progress: 3
  dispatch_stale_timeout_seconds: 1800

# Bedrock-direct config. region: '' means use AWS_REGION env var.
bedrock:
  region: ''
  discovery:
    enabled: false  # Skip ListFoundationModels API call on startup (don't need IAM perm)
  guardrail:
    guardrail_identifier: ''
    guardrail_version: ''
    trace: ''

# Logging — INFO so the stderr handler (attached via -v flag in entrypoint)
# emits all the lines we want in CloudWatch.
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3

# Secret redaction stays on by default (Plan 007-D depends on it).
security:
  redact_secrets: true

# Sessions — auto_prune off in cloud (we want full conversation history in
# Neon per Plan 007-C).
sessions:
  auto_prune: false

# Memory — Atlas RDF-grounded long-term memory (army-of-one Plan 011-C.2).
# The 'atlas' provider augments (does not replace) the built-in memory. It
# reaches cloud Atlas via Cloud Map (ATLAS_BASE_URL) + bearer auth
# (ATLAS_BEARER_TOKEN) — both injected by the Fargate task def. Atlas-side
# failures degrade gracefully (circuit breaker); they never block the agent.
# Activates on the next Hermes image rebuild + redeploy (the plugin ships in
# the image at plugins/memory/atlas/).
memory:
  provider: atlas
  retention_days: 90

# Storage — S3-backed profile/session storage for the SaaS/cloud image
# (Plan age737h-245, phase A). Bucket name and prefix are injected via
# HERMES_S3_BUCKET / HERMES_S3_PREFIX env vars in the Fargate task def.
# Region falls back to AWS_REGION. Credentials are resolved by boto3 via
# the task IAM role (same as Bedrock — no extra secret wiring needed).
storage:
  backend: s3
  s3:
    bucket: ''          # populated via HERMES_S3_BUCKET env var at runtime
    prefix: hermes/
    region: ''          # populated via AWS_REGION env var at runtime
    sse: aws:kms        # server-side encryption — required for compliance
